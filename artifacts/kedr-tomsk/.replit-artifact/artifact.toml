kind = "web"
previewPath = "/"
title = "Кедр-Томск"
version = "1.0.0"
id = "artifacts/kedr-tomsk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23655

[services.development]
run = "pnpm --filter @workspace/kedr-tomsk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kedr-tomsk", "run", "build" ]
publicDir = "artifacts/kedr-tomsk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23655"
BASE_PATH = "/"
